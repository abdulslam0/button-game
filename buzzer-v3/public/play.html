<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>من يضغط الزر أولاً — لاعب</title>
<link rel="stylesheet" href="/shared.css"/>
<style>
#btn-reconnect{
  display:none;position:fixed;bottom:1.25rem;left:1.25rem;z-index:9999;
  background:#b60012;color:#fff;border:none;border-radius:2rem;
  padding:.6rem 1.2rem;font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(182,0,18,.5);font-family:'Tajawal',sans-serif;
  direction:rtl;
}
#btn-reconnect.vis{
  display:block;
  animation:rcpulse 2s ease-in-out infinite;
}
@keyframes rcpulse{0%,100%{opacity:1}50%{opacity:.55}}
</style>
</head>
<body>

<button id="btn-reconnect" onclick="manualReconnect()">⚡ إعادة اتصال</button>

<!-- JOIN FORM -->
<div id="view-join" style="display:flex;flex-direction:column;align-items:center;width:100%">
  <header>
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <h1>من يضغط الزر أولاً</h1>
  </header>
  <div class="card">
    <h2 style="font-size:1.1rem;font-weight:900;color:#241c15;margin-bottom:1rem">انضم إلى غرفة</h2>
    <label style="font-size:.95rem;font-weight:700;display:block;margin-bottom:.1rem">اسمك</label>
    <input type="text" id="player-name" placeholder="اسمك هنا..." maxlength="30"/>
    <label style="font-size:.95rem;font-weight:700;display:block;margin-top:.75rem;margin-bottom:.1rem">رمز الغرفة (4 أرقام)</label>
    <input type="number" id="join-code" placeholder="أدخل الرمز" min="0" max="9999"
           oninput="this.value=this.value.slice(0,4)"
           style="letter-spacing:.25em;font-weight:900"/>
    <div class="form-error" id="join-error"></div>
    <button class="btn btn-red" style="margin-top:.75rem" onclick="joinGame()">دخول</button>
  </div>
</div>

<!-- PLAY VIEW -->
<div id="view-play" style="display:none;flex-direction:column;align-items:center;width:100%">
  <header>
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <h1 id="p-game-name">من يضغط الزر أولاً</h1>
    <div class="room-badge">غرفة: <span class="room-code" id="p-room-code">----</span></div>
  </header>
  <div class="stat-bar" style="max-width:480px;width:100%">
    <div class="stat">اللاعب: <span id="p-name">-</span></div>
    <div class="stat">النقاط: <span id="p-score">0</span></div>
    <div class="stat">الجولة: <span id="p-round">1</span></div>
    <div class="stat">العد: <span id="p-countdown">-</span></div>
  </div>
  <div class="buzzer-wrap">
    <div id="countdown-badge"></div>
    <!--
      NO "disabled" attribute here.
      JS owns the disabled state 100% via setBuzzer().
      Starting enabled=false is set immediately by JS below.
    -->
    <button id="buzzer" onclick="buzz()"></button>
    <p id="player-msg">جاهز؟ انتظر بداية الجولة.</p>
  </div>
  <div class="card" style="margin-top:1rem">
    <h3 style="font-weight:700;margin-bottom:.5rem;font-size:1rem;color:#241c15">اللاعبون</h3>
    <table>
      <thead><tr><th>الاسم</th><th>النقاط</th><th>الحالة</th></tr></thead>
      <tbody id="p-players-tbody"></tbody>
    </table>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// play.html — v6
//
// ROOT CAUSE FIX for "red button does nothing":
//   The HTML had disabled="" on #buzzer. render() sets bz.disabled
//   but only runs when myId is known. If game:state arrives before
//   player:self (common after reconnect), myId is null → render()
//   bails → buzzer stays disabled forever.
//
//   Fix: Remove disabled attribute from HTML. JS sets it immediately
//   on page load. setBuzzer() is called in BOTH player:self AND
//   game:state, so the button is always correct regardless of
//   event arrival order.
// ─────────────────────────────────────────────────────────────

var LS_PID  = 'buzzer_pid';
var LS_ROOM = 'buzzer_room';
var LS_NAME = 'buzzer_name';

var socket    = io({ reconnectionDelay:1000, reconnectionDelayMax:5000 });
var myId      = null;
var roomCode  = null;
var iAmBuzzer = false;
var lastState = null;   // cache so player:self can re-apply it immediately

// Disable buzzer immediately on load (JS owns this, not HTML)
document.getElementById('buzzer').disabled = true;

// ── Heartbeat ────────────────────────────────────────────────
var lastHeartbeat = Date.now();
function bumpHeartbeat(){ lastHeartbeat = Date.now(); }
setInterval(function(){
  if(Date.now() - lastHeartbeat > 15000){
    console.log('[heartbeat] stale, forcing resync');
    forceResync();
  }
}, 5000);

// ── Resync helpers ────────────────────────────────────────────
function emitResync(){
  var pid  = myId  || localStorage.getItem(LS_PID);
  var room = roomCode || localStorage.getItem(LS_ROOM);
  var name = localStorage.getItem(LS_NAME);
  if(pid && room){
    socket.emit('client:resync',{ persistentId:pid, roomCode:room });
  } else if(room && name){
    socket.emit('player:join',{
      name: name,
      roomCode: room,
      persistentId: localStorage.getItem(LS_PID)||undefined
    });
  }
}

function forceResync(){
  if(!socket.connected){ socket.connect(); }
  else { emitResync(); }
}

// ── Reconnect button ──────────────────────────────────────────
var _rcBtn = document.getElementById('btn-reconnect');
function setReconnectBtn(on){
  if(on) _rcBtn.classList.add('vis');
  else   _rcBtn.classList.remove('vis');
}
function manualReconnect(){
  setReconnectBtn(false);
  forceResync();
}

// ── Visibility radar ──────────────────────────────────────────
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    if(!socket.connected) socket.connect();
    else emitResync();
  }
});

// ── Sounds ────────────────────────────────────────────────────
var AC = typeof AudioContext!=='undefined' ? new AudioContext() : null;
function tone(f,d,t,v){
  t=t||'sine'; v=v||0.35;
  if(!AC) return;
  if(AC.state==='suspended') AC.resume();
  var o=AC.createOscillator(), g=AC.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+d);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime+d);
}
function soundPress()  { tone(320,0.12,'square',0.4); }
function soundWinner() {
  [523,659,784].forEach(function(f,i){
    setTimeout(function(){ tone(f,0.3,'sine',0.45); }, i*140);
  });
}
function soundReset()  { tone(440,0.2); setTimeout(function(){tone(550,0.15);},80); }

// ── Status helpers ────────────────────────────────────────────
function statusLabel(s){
  return {winner:'🏆 فائز',ready:'✅ جاهز','too-late':'⛔ تأخر',
          offline:'🔴 غائب',wrong:'❌ خطأ'}[s]||s;
}
function statusClass(s){
  return {winner:'status-winner',ready:'status-ready',
          'too-late':'status-too-late',offline:'status-offline',
          wrong:'status-wrong'}[s]||'';
}

function setMsg(m){
  var el=document.getElementById('player-msg');
  if(!el) return;
  el.style.opacity='0';
  setTimeout(function(){ el.textContent=m; el.style.opacity='1'; },150);
}

// ── THE KEY FIX — setBuzzer() is the single source of truth ──
// Called every time player:self OR game:state arrives, in both cases.
function setBuzzer(state, me){
  var bz=document.getElementById('buzzer');
  if(!bz) return;
  if(!me || !state){
    bz.disabled=true;
    return;
  }
  var isBlocked=(state.blockedIds||[]).indexOf(me.id)>-1;
  bz.disabled = !!(state.gameLocked || state.roundLocked || me.hasPressed || isBlocked);
}

// ── Show play view ────────────────────────────────────────────
function showPlayView(name, code){
  document.getElementById('p-name').textContent       = name;
  document.getElementById('p-room-code').textContent  = code;
  document.getElementById('view-join').style.display  = 'none';
  document.getElementById('view-play').style.display  = 'flex';
}

// ── On load — attempt silent resync ──────────────────────────
window.addEventListener('load', function(){
  var pid  = localStorage.getItem(LS_PID);
  var room = localStorage.getItem(LS_ROOM);
  var name = localStorage.getItem(LS_NAME);
  if(pid && room){
    document.getElementById('player-name').value = name||'';
    document.getElementById('join-code').value   = room;
    socket.emit('client:resync',{ persistentId:pid, roomCode:room });
  }
});

// ── Manual join ───────────────────────────────────────────────
function joinGame(){
  var name=document.getElementById('player-name').value.trim().slice(0,30);
  var code=document.getElementById('join-code').value.trim();
  var err =document.getElementById('join-error');
  err.textContent='';
  if(!name){ err.textContent='أدخل اسمك.'; return; }
  if(!/^\d{4}$/.test(code)){ err.textContent='الرمز يجب أن يكون 4 أرقام.'; return; }
  var pid=localStorage.getItem(LS_PID)||undefined;
  socket.emit('player:join',{ name:name, roomCode:code, persistentId:pid });
}

// ── Buzz ──────────────────────────────────────────────────────
function buzz(){
  soundPress();
  socket.emit('player:buzz',{ roomCode:roomCode, sentAt:Date.now() });
}

// ── Socket lifecycle ──────────────────────────────────────────
socket.on('connect', function(){
  bumpHeartbeat();
  setReconnectBtn(false);
  if(myId && roomCode){
    socket.emit('client:resync',{ persistentId:myId, roomCode:roomCode });
  } else {
    var pid =localStorage.getItem(LS_PID);
    var room=localStorage.getItem(LS_ROOM);
    if(pid && room) socket.emit('client:resync',{ persistentId:pid, roomCode:room });
  }
});

socket.on('disconnect',    function(){ setReconnectBtn(true);  });
socket.on('connect_error', function(){ setReconnectBtn(true);  });

// ── player:self ───────────────────────────────────────────────
// Fires on first join AND every resync.
socket.on('player:self', function(player){
  bumpHeartbeat();
  myId     = player.id;
  roomCode = localStorage.getItem(LS_ROOM) ||
             document.getElementById('join-code').value.trim();
  localStorage.setItem(LS_PID,  player.id);
  localStorage.setItem(LS_ROOM, roomCode);
  localStorage.setItem(LS_NAME, player.name);
  showPlayView(player.name, roomCode);

  // If we already have a cached state (arrived before player:self),
  // apply buzzer state immediately — don't wait for next game:state.
  if(lastState){
    var me=lastState.players.find(function(p){ return p.id===myId; });
    setBuzzer(lastState, me||null);
    renderTable(lastState);
  }
});

// ── room:error ────────────────────────────────────────────────
socket.on('room:error', function(msg){
  bumpHeartbeat();
  var el=document.getElementById('join-error');
  if(el) el.textContent=msg;
});

// ── game:state ────────────────────────────────────────────────
socket.on('game:state', function(state){
  bumpHeartbeat();
  lastState=state;   // always cache

  if(state.gameName)
    document.getElementById('p-game-name').textContent=state.gameName;
  if(!roomCode && state.roomCode)
    roomCode=state.roomCode;

  // Update stat bar whether or not we know myId yet
  document.getElementById('p-round').textContent=state.round;
  document.getElementById('p-countdown').textContent=
    (state.roundLocked && !state.winnerId) ? state.countdown : '-';

  var cb=document.getElementById('countdown-badge');
  if(cb) cb.textContent=
    (!state.winnerId&&state.roundLocked&&!state.gameLocked&&state.countdown>0)
      ? state.countdown : '';

  if(!myId) return;   // can't do player-specific work yet

  var me=state.players.find(function(p){ return p.id===myId; });
  if(!me) return;

  document.getElementById('p-score').textContent=me.score;

  // ← THE FIX: call setBuzzer here, not inline bz.disabled=...
  setBuzzer(state, me);

  var isBlocked=(state.blockedIds||[]).indexOf(myId)>-1;
  if(isBlocked && me.status==='wrong')
    setMsg('❌ إجابة خاطئة — أنت خارج هذه الجولة');
  if(me.status==='winner' && iAmBuzzer)
    setMsg('🎉 أنت الأول! أجب الآن');

  renderTable(state);
});

// ── round:winner ─────────────────────────────────────────────
socket.on('round:winner', function(d){
  bumpHeartbeat();
  if(d.winnerId===myId){
    setMsg('🎉 أنت الأول! أجب الآن');
    soundWinner();
    iAmBuzzer=true;
  } else {
    setMsg('⛔ '+d.winnerName+' ضغط أولاً!');
    iAmBuzzer=false;
  }
});

// ── round:active-flash ────────────────────────────────────────
socket.on('round:active-flash', function(){
  bumpHeartbeat();
  soundReset();
  iAmBuzzer=false;
  var bz=document.getElementById('buzzer');
  if(bz){ bz.classList.add('flash'); setTimeout(function(){bz.classList.remove('flash');},700); }
  setMsg('الجولة بدأت! اضغط الآن');
});

// ── Render helpers ────────────────────────────────────────────
function renderTable(state){
  var tb=document.getElementById('p-players-tbody');
  if(!tb) return;
  tb.innerHTML=state.players.map(function(p){
    return '<tr>'
      +'<td style="font-weight:700">'+p.name+(p.id===myId?' (أنت)':'')+'</td>'
      +'<td>'+p.score+'</td>'
      +'<td class="'+statusClass(p.status)+'">'+statusLabel(p.status)+'</td>'
      +'</tr>';
  }).join('');
}

// ── game:delta — slim control-state update (no player list) ──
// Server sends this for events that don't change player scores/list.
// We merge it into lastState so subsequent renders stay correct.
socket.on('game:delta', function(delta){
  bumpHeartbeat();
  if(!lastState) return;
  // Merge delta fields into cached state
  Object.assign(lastState, delta);
  // Update countdown / round display
  document.getElementById('p-round').textContent=lastState.round;
  document.getElementById('p-countdown').textContent=
    (lastState.roundLocked && !lastState.winnerId) ? lastState.countdown : '-';
  var cb=document.getElementById('countdown-badge');
  if(cb) cb.textContent=
    (!lastState.winnerId&&lastState.roundLocked&&!lastState.gameLocked&&lastState.countdown>0)
      ? lastState.countdown : '';
  if(!myId) return;
  var me=lastState.players.find(function(p){ return p.id===myId; });
  if(me){ setBuzzer(lastState, me); }
});

// ── game:tick — volatile countdown tick (may arrive out of order) ──
// Only updates the countdown numbers; never re-renders player list.
socket.on('game:tick', function(tick){
  bumpHeartbeat();
  // Merge tick into lastState
  if(lastState){
    lastState.round      = tick.round;
    lastState.countdown  = tick.countdown;
    lastState.roundLocked= tick.locked;
  }
  document.getElementById('p-round').textContent=tick.round;
  document.getElementById('p-countdown').textContent=
    (tick.locked) ? tick.countdown : '-';
  var cb=document.getElementById('countdown-badge');
  if(cb) cb.textContent=(tick.locked && tick.countdown>0) ? tick.countdown : '';
});
</script>
</body>
</html>
