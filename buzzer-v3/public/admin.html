<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>من يضغط الزر أولاً — مدير</title>
<link rel="stylesheet" href="/shared.css"/>
</head>
<body>

<!-- ══ SETUP FORM ══════════════════════════════════════════════ -->
<div id="view-setup" style="display:flex;flex-direction:column;align-items:center;width:100%">
  <header>
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <h1>من يضغط الزر أولاً</h1>
  </header>

  <div class="card">
    <h2 style="font-size:1.15rem;font-weight:900;color:#241c15;margin-bottom:1rem">إنشاء غرفة جديدة</h2>

    <label style="font-size:.95rem;font-weight:700;display:block;margin-bottom:.1rem">اسم اللعبة</label>
    <input type="text" id="game-name" placeholder="مثال: مسابقة الجمعة" maxlength="40"/>

    <label style="font-size:.95rem;font-weight:700;display:block;margin-top:.75rem;margin-bottom:.1rem">رمز الغرفة (4 أرقام)</label>
    <input type="number" id="room-code" placeholder="مثال: 1234" min="0" max="9999"
           oninput="this.value=this.value.slice(0,4)" style="letter-spacing:.25em;font-weight:900"/>

    <div class="form-error" id="setup-error"></div>
    <button class="btn btn-red" style="margin-top:.75rem" onclick="createRoom()">إنشاء الغرفة وبدء اللعبة</button>
  </div>
</div>

<!-- ══ ADMIN DASHBOARD ═════════════════════════════════════════ -->
<div id="view-admin" style="display:none;flex-direction:column;align-items:center;width:100%">

  <header>
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <h1 id="a-game-name">لوحة المدير</h1>
    <div class="room-badge">
      رمز الغرفة: <span class="room-code" id="a-room-code">----</span>
    </div>
  </header>

  <div class="admin-grid">

    <!-- Left: players + controls -->
    <div class="card" style="max-width:none">
      <h2 style="font-size:1.1rem;font-weight:900;color:#b60012;margin-bottom:.75rem">اللاعبون المباشرون</h2>
      <table>
        <thead><tr><th>الاسم</th><th>النقاط</th><th>الحالة</th></tr></thead>
        <tbody id="a-players-tbody"><tr><td colspan="3" style="color:#aaa;text-align:center;padding:1rem">لا يوجد لاعبون بعد</td></tr></tbody>
      </table>

      <div id="event-feed">في انتظار اللاعبين...</div>

      <!-- Answer timer -->
      <div id="answer-timer">
        <div class="answer-ring">
          <div class="answer-ring-fill" id="ring-fill"></div>
          <span id="answer-secs">3</span>
        </div>
        <span class="answer-label">وقت الإجابة</span>
      </div>

      <div style="font-size:.9rem;font-weight:700;margin:.4rem 0;color:#555">
        الجولة: <span id="a-round">1</span> &nbsp;|&nbsp; العد: <span id="a-countdown">-</span>
      </div>

      <div class="admin-btns">
        <button class="btn btn-red"   id="btn-give-point"  onclick="emit('admin:give-point')"   disabled>1️⃣ إعطاء نقطة</button>
        <button class="btn btn-gold"  id="btn-reset-round" onclick="emit('admin:reset-round')"  >2️⃣ إعادة تعيين الجولة</button>
        <button class="btn btn-dark"  id="btn-new-game"    onclick="emit('admin:new-game')"     >3️⃣ لعبة جديدة</button>
        <button class="btn btn-black" id="btn-end-game"    onclick="emit('admin:end-game')"     >4️⃣ إنهاء اللعبة</button>
        <button class="btn btn-green" id="btn-unlock"      onclick="emit('admin:unlock-buzzer')" disabled
                style="grid-column:span 2">🔓 فتح الزر للبقية (إجابة خاطئة)</button>
      </div>
    </div>

    <!-- Right: leaderboard -->
    <div class="card" style="max-width:none">
      <h3 style="font-size:1.1rem;font-weight:900;color:#b60012;margin-bottom:.75rem">Leaderboard</h3>
      <div id="a-leaderboard"><p style="color:#aaa;text-align:center">لا يوجد لاعبون بعد</p></div>
    </div>

  </div>
</div>

<!-- Socket.io client -->
<script src="/socket.io/socket.io.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// admin/app.js
// ─────────────────────────────────────────────────────────────

const socket   = io();
let   roomCode = null;

const MEDALS = ['🥇','🥈','🥉'];

// ── Sound synthesis ───────────────────────────────────────────
const AC = typeof AudioContext !== 'undefined' ? new AudioContext() : null;
function tone(f,d,t='sine',v=.35){
  if(!AC)return; if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}
function soundReset(){ tone(440,.2); setTimeout(()=>tone(550,.15),80); }

// ── Helpers ───────────────────────────────────────────────────
function statusLabel(s){
  return {winner:'🏆 فائز',ready:'✅ جاهز','too-late':'⛔ تأخر',offline:'🔴 غائب',wrong:'❌ خطأ'}[s]||s;
}
function statusClass(s){
  return {winner:'status-winner',ready:'status-ready','too-late':'status-too-late',offline:'status-offline',wrong:'status-wrong'}[s]||'';
}

// ── Emit helper (always includes roomCode) ────────────────────
function emit(event){ socket.emit(event, { roomCode }); }

// ── Create room ───────────────────────────────────────────────
function createRoom(){
  const name = document.getElementById('game-name').value.trim();
  const code = document.getElementById('room-code').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.textContent = '';

  if(!name){ errEl.textContent='أدخل اسم اللعبة.'; return; }
  if(!/^\d{4}$/.test(code)){ errEl.textContent='الرمز يجب أن يكون 4 أرقام بالضبط.'; return; }

  socket.emit('admin:create-room', { gameName: name, roomCode: code });
}

// ── Socket events ─────────────────────────────────────────────
socket.on('room:created', ({ roomCode: code, gameName }) => {
  roomCode = code;
  document.getElementById('a-room-code').textContent = code;
  document.getElementById('a-game-name').textContent = gameName;
  document.getElementById('view-setup').style.display = 'none';
  document.getElementById('view-admin').style.display = 'flex';
});

socket.on('room:error', (msg) => {
  document.getElementById('setup-error').textContent = msg;
});

socket.on('game:state', render);

socket.on('round:active-flash', () => { soundReset(); hideAnswerTimer(); });

socket.on('answer:tick', ({ secs }) => { showAnswerTimer(secs); });
socket.on('answer:done', ()         => { hideAnswerTimer(); });

// ── Render ─────────────────────────────────────────────────────
function render(state){
  document.getElementById('a-round').textContent     = state.round;
  document.getElementById('a-countdown').textContent = state.countdown ?? '-';
  document.getElementById('event-feed').textContent  = state.lastEvent;

  // Button states
  const hasWinner = !!state.winnerId;
  document.getElementById('btn-give-point').disabled = !hasWinner;
  document.getElementById('btn-unlock').disabled     = !hasWinner;

  // Players table
  const tb = document.getElementById('a-players-tbody');
  if(state.players.length === 0){
    tb.innerHTML='<tr><td colspan="3" style="color:#aaa;text-align:center;padding:1rem">لا يوجد لاعبون بعد</td></tr>';
  } else {
    tb.innerHTML = state.players.map(p => {
      const blocked = (state.blockedIds||[]).includes(p.id);
      return `<tr>
        <td style="font-weight:700">${p.name}${blocked?' 🚫':''}</td>
        <td>${p.score}</td>
        <td class="${statusClass(p.status)}">${statusLabel(p.status)}</td>
      </tr>`;
    }).join('');
  }

  // Leaderboard
  const sorted = [...state.players].sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name));
  document.getElementById('a-leaderboard').innerHTML = sorted.length
    ? sorted.map((p,i)=>`
        <div class="lb-item">
          <span>${MEDALS[i]||'•'} ${p.name}</span>
          <span>${p.score}</span>
        </div>`).join('')
    : '<p style="color:#aaa;text-align:center">لا يوجد لاعبون بعد</p>';
}

// ── Answer timer UI ───────────────────────────────────────────
function showAnswerTimer(secs){
  const el=document.getElementById('answer-timer');
  document.getElementById('answer-secs').textContent=secs;
  document.getElementById('ring-fill').style.setProperty('--pct',(secs/3*100)+'%');
  el.classList.add('active');
}
function hideAnswerTimer(){
  document.getElementById('answer-timer').classList.remove('active');
}
</script>
</body>
</html>
